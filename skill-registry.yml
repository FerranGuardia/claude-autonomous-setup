# Skill Registry
# Each skill declares what tech it covers and how to detect that tech in a project.
# The setup-project command reads this file, scans the target project, and wires
# only the skills whose detection rules match.
#
# Schema per skill:
#   name:        Skill folder name (must match skills/<category>/<name>/)
#   category:    Grouping (frontend, backend, security, devops, testing, methodology)
#   description: What the skill teaches the agent
#   applies-to:  Semantic tech tags (human-readable)
#   detects:     Rules to match against the project — ANY match = skill applies
#     packages:  npm/pip/nuget/cargo package names to look for
#     files:     Glob patterns for config files that indicate the tech
#     content:   Grep patterns to search in project files
#   agents:      Which agent roles benefit from this skill
#     - task-executor, qa-reviewer, code-simplifier, task-fixer
#     - audit-code-archaeologist, audit-security-auditor, audit-qa-tester
#     - audit-devops-analyst, audit-docs-analyst, audit-requirements-analyst
#   source:      Where the skill was sourced from (for attribution)

skills:
